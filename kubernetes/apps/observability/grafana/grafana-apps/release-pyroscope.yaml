---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-pyroscope
  namespace: observability
spec:
  interval: 15m
  chart:
    spec:
      chart: pyroscope
      version: 1.16.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    serviceMonitor:
      enabled: false
    alloy:
      enabled: false
    pyroscope:
      replicaCount: 1
      extraArgs:
        log.level: debug
      service:
        type: LoadBalancer
        labels:
          service-type/vxlan: static
        annotations:
          lbipam.cilium.io/ips: "10.129.16.104"
    # # preset: network
    # tolerations:
    #   - key: node-role.kubernetes.io/control-plane
    #     operator: "Exists"
    #     effect: "NoSchedule"
    # serviceMonitor:
    #   enabled: true
    # config:
    #   create: false
    #   ## -- Provide the name of the external configmap containing the beyla configuration.
    #   ## To create configmap from configuration file, user can use the below command. Note: The name 'beyla-config.yaml' is important.
    #   ## `kubectl create cm --from-file=beyla-config.yaml=<name-of-config-file> -n <namespace>`
    #   ## If empty, default configuration below is used.
    #   name: "beyla-config"
    #   # -- default value of beyla configuration
    #   data:
    #     # otel_traces_export:
    #     #   endpoint: http://opentelemetry-collector.observability.svc.cluster.local:4318
    #     prometheus_export:
    #       port: 9090
    #       path: /metrics
    #     # to enable internal metrics
    #     # internal_metrics:
    #     #   prometheus:
    #     #     port: 6060
    #     #     path: /metrics
    # # env:
    # #   OTEL_EXPORTER_OTLP_ENDPOINT: http://opentelemetry-collector.observability.svc.cluster.local:4318
    # #   BEYLA_TRACE_PRINTER: text
    # #   BEYLA_KUBE_CLUSTER_NAME: test
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: grafanadatasource-pyroscope
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  uid: pyroscope
  datasource:
    name: Pyroscope
    type: grafana-pyroscope-datasource
    access: proxy
    url: http://grafana-pyroscope.observability.svc.cluster.local:4040
    jsonData: {}
