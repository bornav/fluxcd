apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: matrix-pg-whatsapp
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-system-trixie
  managed:
    services:
      disabledDefaultServices: ["ro", "r"] # removes 2 services
      # additional: to create your own
      # - selectorType: rw
      #   serviceTemplate:
      #     metadata:
      #       name: "mydb-lb"
      #       labels:
      #         test-label: "true"
      #       annotations:
      #         test-annotation: "true"
      #     spec:
      #       type: LoadBalancer
    roles:
      - name: synapse
        superuser: true
        login: true
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: synapse-pg-superuser
  storage:
    storageClass: longhorn-cngp-eph
    size: 12Gi
  # walStorage:
  #   storageClass: longhorn-cngp-eph
  #   size: 2Gi
  externalClusters:
    - name: &name matrix-pg-whatsapp
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: *name
          serverName: *name
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: *name
        serverName: *name
  bootstrap:
    # initdb:
    #   database: whatsapp
    #   owner: synapse # make sure same as "username" in secret down
    #   secret:
    #     name: synapse-ext-new
    #   encoding: UTF8
    #   locale: C
    recovery:
      source: *name
      # recoveryTarget:
      #   backupID: "20260607T120002"
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: matrix-pg-whatsapp
spec:
  retentionPolicy: 60d
  configuration:
    destinationPath: s3://backups/postgres/cluster-cloud/matrix
    endpointURL: http://10.53.255.254:9000
    s3Credentials:
      accessKeyId:
        name: rustfs-synapse-pg-backup-secrets
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: rustfs-synapse-pg-backup-secrets
        key: AWS_SECRET_ACCESS_KEY
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 8
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: matrix-pg-whatsapp-backup
spec:
  # immediate: true #To trigger a backup immediately
  schedule: "0 0 */6 * * *" # every 6 hours
  backupOwnerReference: self
  cluster:
    name: matrix-pg-whatsapp
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
