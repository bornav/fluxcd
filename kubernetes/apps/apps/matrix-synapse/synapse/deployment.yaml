---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/master/deployment.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-synapse
  labels:
    app: matrix-synapse
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matrix-synapse
  template:
    metadata:
      annotations:
        prometheus.io/path: /_synapse/metrics
        prometheus.io/port: "9090"
        prometheus.io/scrape: "true"
      labels:
        app: matrix-synapse
    spec:
      nodeSelector:
        node-arch: arm64
      # shareProcessNamespace: true
      initContainers:
        - name: grab-scripts
          image: docker.io/alpine/curl:8.21.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              #!/bin/sh
              set -e
              cd /scripts
              FOLDER=synapse-s3-storage-provider
              if [ ! -d "$FOLDER" ]; then
                  curl -fsSL --retry 8 \
                    https://github.com/matrix-org/synapse-s3-storage-provider/archive/refs/tags/v1.6.1.tar.gz \
                    -o /tmp/s3-provider.tar.gz
                  tar xzf /tmp/s3-provider.tar.gz -C /scripts
                  mv /scripts/synapse-s3-storage-* "$FOLDER"
                  rm -f /tmp/s3-provider.tar.gz
              fi
          volumeMounts:
            - mountPath: /scripts
              name: scripts
      containers:
        - image: &synapse_image matrixdotorg/synapse:v1.157.1
          name: matrix-synapse
          command:
            - sh
            - -c
            # - sleep infinity
            - |
              /start.py generate
              curl https://raw.githubusercontent.com/devture/matrix-synapse-shared-secret-auth/master/shared_secret_authenticator.py -o  /usr/local/lib/python$(python --version|cut -d' ' -f2- | cut -d'.' -f1-2)/shared_secret_authenticator.py
              pip install boto3
              export PYTHONPATH=$PYTHONPATH:/scripts/synapse-s3-storage-provider/
              cat /synapse/conf.d/* >> $SYNAPSE_CONFIG_PATH
              /start.py
          ports:
            - name: http
              protocol: TCP
              containerPort: 8008
            - name: https
              protocol: TCP
              containerPort: 8448
            - name: metrics
              protocol: TCP
              containerPort: 9000
            - name: replication
              protocol: TCP
              containerPort: 9092
            - name: httpreplication
              protocol: TCP
              containerPort: 9093
          env:
            - name: SYNAPSE_CACHE_FACTOR # overwrites config file
              value: "5.00"
            - name: SYNAPSE_CONFIG_PATH
              value: "/synapse/homeserver.yaml"
            - name: SYNAPSE_SERVER_NAME
              value: "matrix.icylair.com"
            - name: SYNAPSE_REPORT_STATS
              value: "no"
          imagePullPolicy: IfNotPresent
          # livenessProbe:
          #   httpGet:
          #     path: /_matrix/client/versions
          #     port: 8008
          #     scheme: HTTP
          #   initialDelaySeconds: 120
          # readinessProbe:
          #   httpGet:
          #     path: /_matrix/client/versions
          #     port: 8008
          #     scheme: HTTP
          #   initialDelaySeconds: 10
          resources:
            requests:
              memory: "1Mi"
              cpu: "1m"
            limits:
              memory: "6Gi"
          volumeMounts:
            - mountPath: /scripts
              name: scripts
            - mountPath: /data
              name: matrix-synapse-data
            - mountPath: /synapse/bridge_whatsapp.yaml
              name: matrix-synapse-config
              subPath: bridge_whatsapp
            - mountPath: /synapse/bridge_meta.yaml
              name: matrix-synapse-config
              subPath: bridge_meta
            - mountPath: /synapse/doublepuppet.yaml
              name: matrix-synapse-config
              subPath: doublepuppet
            - mountPath: /synapse/conf.d/homeserver.yaml
              name: matrix-synapse-config
              subPath: homeserver
            - name: s3-storage-provider
              mountPath: /synapse/conf.d/s3-storage-provider.yaml
              subPath: s3-storage-provider.yaml
              readOnly: true
            - name: s3-storage-provider
              mountPath: /synapse/conf.d/db.yaml
              subPath: db.yaml
              readOnly: true
            - name: s3-storage-provider
              mountPath: /synapse/conf.d/oidc.yaml
              subPath: oidc.yaml
              readOnly: true
        - image: *synapse_image
          name: s3-upload-missing
          command:
            - sh
            - -c
            - |
              pip install boto3 humanize tqdm
              cd /scripts/synapse-s3-storage-provider/scripts
              while true; do
                  sleep 10m
                  echo "checking if local files are missing on s3"
                  ./s3_media_upload update-db \
                      --homeserver-config-path /synapse/conf.d/s3-storage-provider.yaml \
                      --homeserver-config-path /synapse/conf.d/db.yaml \
                      0d && \
                  ./s3_media_upload check-deleted /data/media_store/ && \
                  ./s3_media_upload upload /data/media_store/ nobackup \
                      --endpoint-url "$S3_ENDPOINT" \
                      --prefix matrix-s3-storage/synapse/
              done
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: aws-bucket-storage
          resources:
            requests:
              memory: "1Mi"
              cpu: "1m"
            limits:
              memory: "1Gi"
          volumeMounts:
            - mountPath: /scripts
              name: scripts
            - mountPath: /synapse/homeserver.yaml
              name: matrix-synapse-config
              subPath: homeserver
            - mountPath: /data
              name: matrix-synapse-data
            - name: s3-storage-provider
              mountPath: /synapse/conf.d/s3-storage-provider.yaml
              subPath: s3-storage-provider.yaml
              readOnly: true
            - name: s3-storage-provider
              mountPath: /synapse/conf.d/db.yaml
              subPath: db.yaml
              readOnly: true
      restartPolicy: Always
      securityContext:
        fsGroup: 0
        runAsGroup: 0
        runAsUser: 0
      volumes:
        - name: scripts
          emptyDir: {}
        - name: matrix-synapse-data
          emptyDir: {}
        - name: matrix-synapse-config
          configMap:
            name: matrix-synapse
            defaultMode: 0777
        - name: matrix-synapse-bridges
          configMap:
            name: matrix-synapse-bridges
            defaultMode: 0777
        - name: s3-storage-provider
          secret:
            secretName: aws-bucket-storage

            # items:
            # - key: s3-storage-provider.yaml
            #   path: s3-storage-provider.yaml
status: {}
#to get the key "curl -XPOST -d '{"type":"m.login.password","identifier":{"type": "m.id.user", "user": "<username>"},"password":"<pass>","initial_device_display_name":"a fancy bridge"}' https://matrix.cloud.icylair.com/_matrix/client/v3/login"
