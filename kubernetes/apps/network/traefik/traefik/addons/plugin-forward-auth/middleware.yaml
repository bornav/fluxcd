apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc-auth
spec:
  plugin:
    traefikoidc:
      providerURL: urn:k8s:secret:keycloak-sso-data:PROVIDERS_OIDC_ISSUER_URL
      clientID: urn:k8s:secret:keycloak-sso-data:PROVIDERS_OIDC_CLIENT_ID
      clientSecret: urn:k8s:secret:keycloak-sso-data:PROVIDERS_OIDC_CLIENT_SECRET # traefik operator annotation | urn:k8s:secret | keycloak-sso-data | CLIENT_SECRET # also if namespace required urn:k8s:secret:ns:name:key
      sessionEncryptionKey: urn:k8s:secret:keycloak-sso-data:SESSION_KEY
      callbackURL: /oauth2/callback
      logoutURL: /oauth2/logout
      postLogoutRedirectURI: /
      # forceHTTPS defaults to true (secure-by-default). Only set false if you
      # serve OIDC over plaintext HTTP for local dev.
      # allowedUserDomains: [company.com]
      allowedRolesAndGroups: [admin]
      excludedURLs: [/health, /metrics]
      audience: account
      # redis:
      #   enabled: true
      #   address: "redis-service.redis-namespace:6379"
      #   password: "urn:k8s:secret:redis-secret:password"
      #   db: 0
      #   keyPrefix: "traefikoidc:"
      #   cacheMode: "hybrid"
      #   poolSize: 20
      #   enableCircuitBreaker: true
      #   circuitBreakerThreshold: 5
