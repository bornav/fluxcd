apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-keycloak
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-system-trixie
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: keycloak-pg-superuser
  storage:
    storageClass: longhorn-cngp-eph
    size: 5Gi
  externalClusters:
    - name: &name pg-keycloak
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: *name
          serverName: *name
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: *name
      serverName: *name
  bootstrap:
    # initdb:
    #   database: pg_keycloak
    #   owner: keycloak
    #   secret:
    #     name: keycloak-auth
    recovery:
      source: *name
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: pg-keycloak
spec:
  retentionPolicy: 60d
  configuration:
    destinationPath: s3://backups/postgres/cluster-cloud
    endpointURL: http://10.53.255.254:9000
    s3Credentials:
      accessKeyId:
        name: rustfs-cnpg-cloud-token
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: rustfs-cnpg-cloud-token
        key: AWS_SECRET_ACCESS_KEY
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 8
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-keycloak-backup
spec:
  # immediate: true #To trigger a backup immediately
  schedule: "0 0 */6 * * *" # every 6 hours
  backupOwnerReference: self
  cluster:
    name: pg-keycloak
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
